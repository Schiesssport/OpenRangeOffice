name: Deploy to GitHub Pages

on:
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Stage deploy directory
        run: |
          mkdir -p _site/src
          cp index.html styles.css icon.svg manifest.webmanifest sw.js _site/
          cp src/app.js _site/src/
          cp -r src/core src/vendor _site/src/

      - name: Stamp release tag into sw.js
        run: sed -i "s/__CACHE_VERSION__/openrangeoffice-${{ github.event.release.tag_name }}/" _site/sw.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
